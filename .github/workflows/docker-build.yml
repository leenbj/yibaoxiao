# ============================================================
# Yibaoxiao Pro - GitHub Actions Docker Build Workflow
# Supabase Cloud Backend - Frontend Only Deployment
# ============================================================

name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
      deploy:
        description: 'Deploy to server after build'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/yibaoxiao-frontend

jobs:
  # ==================== Build Frontend Image ====================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ==================== Deploy to Server ====================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment compose file
        run: |
          cat > docker-compose.supabase.yml << 'EOF'
          version: '3.8'

          services:
            frontend:
              image: ghcr.io/${{ github.repository_owner }}/yibaoxiao-frontend:latest
              container_name: yibaoxiao-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
                interval: 60s
                timeout: 10s
                retries: 3
              deploy:
                resources:
                  limits:
                    cpus: '0.5'
                    memory: 256M
                  reservations:
                    cpus: '0.1'
                    memory: 64M
          EOF

      - name: Upload deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: docker-compose.supabase.yml
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              COMPOSE_CMD="docker-compose"
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            $COMPOSE_CMD -f docker-compose.supabase.yml pull
            $COMPOSE_CMD -f docker-compose.supabase.yml up -d --remove-orphans

      - name: Generate deployment summary
        run: |
          echo "## Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`${{ secrets.DEPLOY_HOST }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Path: \`${{ secrets.DEPLOY_PATH }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.FRONTEND_IMAGE }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: Supabase Cloud" >> "$GITHUB_STEP_SUMMARY"

  # ==================== Build Report ====================
  report:
    name: Build Report
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy]
    if: always()

    steps:
      - name: Generate build report
        run: |
          echo "## Yibaoxiao Pro - Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result == 'success' && 'Success' || 'Failed' }} | \`${{ env.FRONTEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result == 'success' && 'Success' || needs.deploy.result == 'skipped' && 'Skipped' || 'Failed' }} | \`${{ secrets.DEPLOY_HOST || 'Not configured' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend" >> $GITHUB_STEP_SUMMARY
          echo "- Type: Supabase Cloud" >> $GITHUB_STEP_SUMMARY
          echo "- URL: \`${{ secrets.VITE_SUPABASE_URL }}\`" >> $GITHUB_STEP_SUMMARY
